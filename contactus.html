                <i class="fas fa-search"></i>

                <button class="btn- call to place order">📞 call to place order</button>
            </div>

<body>

  <section class="contact-page">

    <h1>Contact Us</h1>
    <p>We’d love to hear from you. Fill in the form below.</p>

    <form class="contact-form">

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="tel" name="phone">

      <label>Message</label>
      <textarea name="message" rows="6" required></textarea>

      <button type="submit">Submit</button>

    </form>

  </section>
  
<p class="success-message" style="display:none; color:rgb(32, 30, 179); font-weight:bold;">
  Contact has been successfully sent ✔
</p>
<script src="Script.js"></script>
</body>
</html>
